train:
  way: 5
  shot: 5
  query: 15
  num_session: 10
  num_base: 60
  num_novel: 45
  num_all: 105
  start_session: 0
  test_times: 10
  seq_sample: false
  tmp_train: false
  Method: test
  batch_size_base: 128
  lamda_proto: !!float 0.6
  stochastic: proto
  pit_mixup_alpha: 4.0

  model_dir:
    s3c_model_dir: null # for stdu
    tmp_model_dir: null # stdu temp model paht
    s0_model_dir: null
    sf_model_dir: null # final session's model path
  seed: 1988
  epochs:
    epochs_pre: 10

    epochs_base: 200
    epochs_new: 200
  lr:
    lr_std: !!float 0.1
    lr_base: !!float 0.01
    lr_new: !!float 0.1
    lr_cec_base: 0.0002
    lr_sis_base: 0.0002
    lrg: !!float 0.0002  #lr for graph attention
  scheduler: 
    schedule: Step # ['Step', 'Milestone','ALRS']
    milestones: [40, 80, 120]
    step: 40
    gamma: !!float 0.5
  optimizer:
    decay: !!float 0.0005
    momentum: !!float 0.9
  network:
    temperature: 16
    base_mode: ft_cos  # ['ft_dot', 'ft_cos']
    new_mode: avg_cos  # ['ft_dot', 'ft_cos', 'avg_cos'] ft_dot means using linear classifier, ft_cos means using cosine classifier, avg_cos means using average data embedding and cosine classifier
  strategy:
    data_init: true
    data_init_new: false
    set_no_val: false
    seq_sample: false
  episode:
    train_episode: 50
    episode_way: 5
    base: 10

    episode_shot: 5
    episode_query: 15
    syn_new: 5

    low_way: 5
    low_shot: 5
  dataloader:
    num_workers: 8
    train_batch_size: 128
    test_batch_size: 100
  calibration: false
  ridge: false
  augment: false
  mixup: false
  RRC: true
  RLF: true
  Gnoise: false
  local_crops_number: 0
  n_mels: 128
  crop_frames: 201
  virtual_crop_scale: [1, 1.5]
  local_crops_size: [16, 16]

